name: billing_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Code Generation Annotations
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Networking
  dio: ^5.7.0
  dio_smart_retry: ^6.0.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # UI & Utilities
  google_fonts: ^6.1.0
  vibration: ^3.1.8
  intl: ^0.19.0
  permission_handler: ^11.3.1
  
  # Scanner & Printer
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  bloc: ^8.1.4
  uuid: ^4.5.2
  app_settings: ^7.0.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/images/logo.png"
  min_sdk_android: 21 # android >= 21


flutter:
  uses-material-design: true
  assets:
    - lib/images/
